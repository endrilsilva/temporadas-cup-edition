<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 TEMPORADAS - CUP EDITION</title>
    
    <!-- ✅ BLOQUEADOR DE CAIXAS E ANÚNCIOS - SÓ CAIXAS, NÃO MEXE NO CONTEÚDO -->
    <script>
        // Lista de termos de TODAS as caixas que aparecem
        const termosProibidos = [
            'catálogo', 'produtos gratuito', 'aumente suas vendas', 'tá esperando', 'abrir >', 'nex',
            'google cloud', 'gemini', 'app enterprise', 'ia feita para trabalhar', 'comece a usar',
            'anúncio', 'publicidade', 'promoção', 'oferta', 'aviso', 'mensagem', 'notificação',
            'banner', 'caixa', 'quadro', 'card', 'popup', 'modal', 'flutuante', 'barra'
        ];

        // 1. BLOQUEIA REQUISIÇÕES DE PROPAGANDA
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            let url = typeof input === 'string' ? input : input.url;
            const urlBaixa = url.toLowerCase();
            if (termosProibidos.some(t => urlBaixa.includes(t)) || 
                urlBaixa.includes('ad.') || urlBaixa.includes('ads.') || urlBaixa.includes('anuncio')) {
                return new Promise(() => {});
            }
            return originalFetch.apply(this, arguments);
        };

        // 2. FUNÇÃO PRINCIPAL: REMOVE SÓ CAIXAS, QUADROS E BLOCOS DE ANÚNCIO
        function removerTodasCaixasDeAnuncio() {
            // Pega TODOS os elementos que podem ser caixas
            const todosElementos = document.querySelectorAll('div, section, aside, span, ins, iframe');

            todosElementos.forEach(el => {
                const texto = (el.textContent || '').toLowerCase().trim();
                const classe = (el.className || '').toLowerCase();
                const id = (el.id || '').toLowerCase();
                const estilo = getComputedStyle(el);

                // ✅ REGRA 1: Se tiver QUALQUER texto de anúncio, APAGA TUDO
                if (termosProibidos.some(termo => texto.includes(termo))) {
                    el.remove();
                    return;
                }

                // ✅ REGRA 2: Se o nome da classe ou ID for de propaganda, APAGA
                if (classe.includes('ad') || classe.includes('anuncio') || classe.includes('banner') || classe.includes('popup') ||
                    id.includes('ad') || id.includes('anuncio') || id.includes('banner') || id.includes('popup')) {
                    el.remove();
                    return;
                }

                // ✅ REGRA 3: DETECTA CAIXAS FLUTUANTES OU FIXAS (como as que aparecem na imagem)
                if (
                    (estilo.position === 'fixed' || estilo.position === 'absolute' || estilo.position === 'sticky') &&
                    el.offsetWidth > 100 && el.offsetHeight > 30 && el.offsetHeight < 300 && // Tamanho típico de caixa de anúncio
                    estilo.zIndex > 10 // Camada alta, fica por cima do conteúdo
                ) {
                    // Só remove se NÃO for parte do conteúdo principal
                    if (!texto.includes('cup edition') && !texto.includes('temporadas') && !texto.includes('desafio') && !texto.includes('liga')) {
                        el.remove();
                        return;
                    }
                }

                // ✅ REGRA 4: DETECTA BARRAS NO TOPO OU RODAPÉ
                if (
                    (estilo.top === '0px' || estilo.bottom === '0px') &&
                    el.offsetHeight > 20 && el.offsetHeight < 200 &&
                    el.offsetWidth > 200
                ) {
                    if (!texto.includes('cup edition')) {
                        el.remove();
                    }
                }
            });
        }

        // 3. EXECUTA VÁRIAS VEZES PARA GARANTIR QUE NENHUMA CAIXA APAREÇA
        window.addEventListener('load', () => {
            removerTodasCaixasDeAnuncio();
            setInterval(removerTodasCaixasDeAnuncio, 150); // Verifica a cada 0,15s (rápido)
            setTimeout(removerTodasCaixasDeAnuncio, 500);
            setTimeout(removerTodasCaixasDeAnuncio, 1000);
            setTimeout(removerTodasCaixasDeAnuncio, 2000);
        });

        // 4. CSS: ESCONDE QUALQUER COISA QUE SEJA CAIXA DE ANÚNCIO
        const cssBloqueio = `
            div[class*="ad"], div[id*="ad"], div[class*="anuncio"], div[id*="anuncio"],
            div[class*="banner"], div[id*="banner"], div[class*="popup"], div[id*="popup"],
            div[class*="modal"], div[id*="modal"], div[class*="aviso"], div[id*="aviso"],
            ins, .adsbygoogle, [data-ad-slot], [data-ad-client] {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                width: 0 !important;
                overflow: hidden !important;
                position: absolute !important;
                z-index: -9999 !important;
            }
        `;
        const estilo = document.createElement('style');
        estilo.textContent = cssBloqueio;
        document.head.appendChild(estilo);
    </script>
    <!-- ✅ FIM DO BLOQUEADOR DE CAIXAS -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            margin: 0 !important;
            padding: 0 !important;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <!-- ✅ SITE EM TELA CHEIA - SEM CAIXAS, SEM ANÚNCIOS -->
    <iframe 
        src="https://challenge.place/l/698577e0232f90c18a24c32b" 
        allowfullscreen
        sandbox="allow-same-origin allow-scripts allow-forms allow-top-navigation allow-popups">
    </iframe>

</body>
</html>
