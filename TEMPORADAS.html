<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 TEMPORADAS - CUP EDITION</title>
    
    <!-- ✅ BLOQUEADOR DE ANÚNCIOS - AJUSTADO: BLOQUEIA SÓ PROPAGANDA, NÃO O CONTEÚDO -->
    <script>
        // Lista com termos APENAS de anúncios, caixas e avisos
        const bloquear = [
            'ads.', 'ad.', 'anuncio', 'banner', 'popup', 'track', 'analytics', 
            'doubleclick', 'googlesyndication', 'adserver', 'advert', 'pixel',
            'monetization', 'adservice', 'click', 'promo', 'sponsor', 'taboola',
            'outbrain', 'criteo', 'ampproject', 'moatads', 'zedo', 'advertising',
            'pubmatic', 'rubicon', 'appnexus', 'openx', 'adform', 'teads',
            'adtech', 'smartadserver', 'revcontent', 'adblade', 'adroll',
            'flutuante', 'capa', 'overlay', 'modal', 'intersticial', 'sticky',
            'top-banner', 'bottom-banner', 'header-ad', 'footer-ad', 'ad-bar',
            'catálogo', 'produtos gratuito', 'aumente suas vendas', 'tá esperando',
            'abrir >', 'nex', 'message-box', 'aviso-publicidade', 'card-ad'
        ];

        // 1. Bloqueia requisições de arquivos de propaganda
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            let url = typeof input === 'string' ? input : input.url;
            if (bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                return new Promise(() => {});
            }
            return originalFetch.apply(this, arguments);
        };

        const originalOpen = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url) {
            if (bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                return;
            }
            return originalOpen.apply(this, arguments);
        };

        // 2. Bloqueia criação de elementos de propaganda
        const originalCreateElement = document.createElement;
        document.createElement = function(tag) {
            const el = originalCreateElement.call(this, tag);
            
            if (['script', 'img', 'iframe', 'link'].includes(tag)) {
                const prop = (tag === 'link') ? 'href' : 'src';
                const originalSet = Object.getOwnPropertyDescriptor(
                    tag === 'link' ? HTMLLinkElement : HTMLImageElement.prototype, prop
                ).set;
                
                Object.defineProperty(el, prop, {
                    set: function(url) {
                        if (url && bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                            return;
                        }
                        originalSet.call(this, url);
                    }
                });
            }

            return el;
        };

        // 3. FUNÇÃO PRINCIPAL: SÓ REMOVE O QUE FOR ANÚNCIO OU CAIXA DE AVISO
        function removerAnuncios() {
            const todos = document.querySelectorAll('div, section, aside, span');
            todos.forEach(el => {
                const texto = (el.textContent || '').toLowerCase().trim();
                const classe = (el.className || '').toLowerCase();
                const id = (el.id || '').toLowerCase();
                const estilo = getComputedStyle(el);

                // ✅ REMOVE CAIXA COM O TEXTO DO ANÚNCIO QUE APARECEU
                if (texto.includes('catálogo') || texto.includes('produtos gratuito') || texto.includes('aumente suas vendas') || texto.includes('tá esperando') || texto.includes('abrir >') || texto.includes('nex')) {
                    el.remove();
                    return;
                }

                // ✅ REMOVE ELEMENTOS QUE TEM NOME DE ANÚNCIO NA CLASSE OU ID
                if (bloquear.some(palavra => (classe + id).includes(palavra))) {
                    el.remove();
                    return;
                }

                // ✅ REMOVE SÓ CAIXAS FLUTUANTES, NÃO O CONTEÚDO PRINCIPAL
                if (
                    (estilo.position === 'fixed' || estilo.position === 'absolute') &&
                    el.offsetWidth > 150 && el.offsetHeight > 80 && el.offsetHeight < 500 &&
                    (estilo.zIndex > 50)
                ) {
                    // Verifica se NÃO faz parte do conteúdo principal
                    if (!texto.includes('cup edition') && !texto.includes('temporadas') && !texto.includes('desafio')) {
                        el.remove();
                    }
                }

                // ✅ REMOVE SÓ BARRAS NO TOPO OU RODAPÉ PEQUENAS
                if ((estilo.top === '0px' || estilo.bottom === '0px') && el.offsetHeight > 20 && el.offsetHeight < 200 && estilo.zIndex > 10) {
                    el.remove();
                }
            });
        }

        // 4. Executa limpeza sem atrapalhar o carregamento
        window.addEventListener('load', () => {
            setTimeout(removerAnuncios, 300);
            setTimeout(removerAnuncios, 800);
            setTimeout(removerAnuncios, 1500);
            setInterval(removerAnuncios, 2000); // Verifica de 2 em 2 segundos
        });

        // 5. Bloqueia mensagens de propaganda
        window.addEventListener('message', function(e) {
            if (e.data && typeof e.data === 'string' && bloquear.some(p => e.data.toLowerCase().includes(p))) {
                e.stopImmediatePropagation();
                e.preventDefault();
            }
        }, true);

        // 6. CSS: SÓ ESCONDE O QUE FOR ANÚNCIO, DEIXA O RESTO APARECER
        const css = `
            *[class*="ad-"], *[id*="ad-"], *[class*="anuncio"], *[id*="anuncio"], 
            *[class*="banner"], *[id*="banner"], *[class*="popup"], *[id*="popup"],
            *[class*="modal"], *[id*="modal"], *[class*="aviso-propaganda"] {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                width: 0 !important;
                overflow: hidden !important;
            }
        `;
        const style = document.createElement('style');
        style.textContent = css;
        document.head.appendChild(style);
    </script>
    <!-- ✅ FIM DO BLOQUEADOR AJUSTADO -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            margin: 0 !important;
            padding: 0 !important;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <!-- ✅ LINK INCORPORADO - TELA CHEIA + BLOQUEIO SÓ DE ANÚNCIOS -->
    <iframe 
        src="https://challenge.place/l/698577e0232f90c18a24c32b" 
        allowfullscreen
        sandbox="allow-same-origin allow-scripts allow-forms allow-top-navigation allow-popups">
    </iframe>

</body>
</html>
