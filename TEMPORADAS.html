<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 TEMPORADAS - CUP EDITION</title>
    
    <!-- ✅ BLOQUEADOR NÍVEL MÁXIMO - FORÇA TOTAL -->
    <script>
        // INTERCEPTA TUDO ANTES DE CARREGAR
        window.onbeforeunload = function() {};

        const listaBloqueio = [
            'catálogo', 'produtos gratuito', 'aumente suas vendas', 'tá esperando', 'abrir >', 'nex',
            'google', 'gemini', 'cloud', 'app enterprise', 'ia feita', 'comece a usar', 'adsbygoogle',
            'anuncio', 'publicidade', 'banner', 'popup', 'modal', 'flutuante', 'sticky', 'intersticial',
            'barra-superior', 'barra-inferior', 'caixa-aviso', 'card-promocao'
        ];

        // 1. BLOQUEIA CRIAÇÃO DE QUALQUER ELEMENTO SUSPEITO
        const originalCreate = document.createElement;
        document.createElement = function(tag) {
            const el = originalCreate.call(this, tag);
            
            // Se for div, span ou iframe, vigia tudo
            if (tag === 'div' || tag === 'span' || tag === 'iframe' || tag === 'section') {
                
                // Bloqueia por classe ou ID
                const originalSet = el.setAttribute;
                el.setAttribute = function(nome, valor) {
                    const v = valor.toLowerCase();
                    if (listaBloqueio.some(p => v.includes(p)) || v.includes('ad-') || v.includes('anuncio')) {
                        this.style.cssText = 'display:none !important; width:0 !important; height:0 !important; position:absolute !important; left:-9999px !important;';
                    }
                    return originalSet.call(this, nome, valor);
                };

                // Bloqueia por conteúdo
                setTimeout(() => {
                    const txt = (el.textContent || '').toLowerCase();
                    if (listaBloqueio.some(palavra => txt.includes(palavra)) && txt.length < 300) {
                        el.remove();
                    }

                    // Bloqueia por posição (fixo em cima ou baixo)
                    const est = getComputedStyle(el);
                    if ((est.position === 'fixed' || est.position === 'absolute') && 
                        (est.top === '0px' || est.bottom === '0px' || est.zIndex > 100)) {
                        if (el.offsetHeight > 20 && el.offsetHeight < 300) {
                            el.remove();
                        }
                    }
                }, 10);
            }
            return el;
        };

        // 2. FUNÇÃO DE LIMPEZA AGRESSIVA - RODA 100 VEZES POR SEGUNDO
        function limparTudo() {
            const todos = document.querySelectorAll('*');
            for (let i = 0; i < todos.length; i++) {
                const el = todos[i];
                const txt = (el.textContent || '').toLowerCase();
                const cls = (el.className || '').toLowerCase();
                const id = (el.id || '').toLowerCase();

                // APAGA SE TIVER QUALQUER TEXTO DOS ANÚNCIOS
                if (listaBloqueio.some(p => txt.includes(p)) || 
                    cls.includes('ad') || cls.includes('anuncio') || cls.includes('banner') ||
                    id.includes('ad') || id.includes('anuncio') || id.includes('banner')) {
                    el.outerHTML = '';
                    continue;
                }

                // APAGA SE FOR CAIXA BRANCA FLUTUANTE
                const est = getComputedStyle(el);
                if (est.position === 'fixed' || est.position === 'absolute') {
                    if (el.offsetWidth > 100 && el.offsetHeight > 50 && el.offsetHeight < 400) {
                        if (!txt.includes('cup edition') && !txt.includes('temporadas')) {
                            el.outerHTML = '';
                        }
                    }
                }
            }
        }

        // COMEÇA A LIMPAR ANTES MESMO DA PÁGINA CARREGAR
        setInterval(limparTudo, 10); // A CADA 0,01 SEGUNDOS
        window.addEventListener('DOMContentLoaded', limparTudo);
        window.addEventListener('load', limparTudo);

        // 3. CSS SUPERA TODAS AS REGRAS DO SITE
        const css = `
            * { animation: none !important; transition: none !important; }
            
            /* BLOQUEIA TUDO QUE PARECE ANÚNCIO */
            div[style*="position:fixed"], div[style*="position:absolute"],
            div[class*="ad"], div[id*="ad"], div[class*="anuncio"], div[id*="anuncio"],
            div[class*="banner"], div[id*="banner"], div[class*="popup"], div[id*="popup"],
            ins, .adsbygoogle, [data-ad-client], [data-ad-slot],
            iframe:not([src*="challenge.place"]),
            div:empty:not([class*="conteudo"]):not([class*="principal"]) {
                display: none !important;
                visibility: hidden !important;
                max-height: 0 !important;
                max-width: 0 !important;
                overflow: hidden !important;
                pointer-events: none !important;
            }

            /* FORÇA O CONTEÚDO PRINCIPAL A OCUPAR TELA TODA */
            body > div, main, #conteudo-principal {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
            }
        `;
        const s = document.createElement('style');
        s.textContent = css;
        document.head.appendChild(s);
    </script>
    <!-- ✅ FIM DO BLOQUEADOR DE FORÇA MÁXIMA -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            background: #fff;
        }
    </style>
</head>
<body>

    <!-- ✅ CARREGAMENTO EM TELA CHEIA -->
    <iframe 
        src="https://challenge.place/l/698577e0232f90c18a24c32b" 
        allowfullscreen
        sandbox="allow-same-origin allow-scripts allow-forms allow-top-navigation">
    </iframe>

</body>
</html>
