<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 TEMPORADAS - CUP EDITION</title>
    
    <!-- ✅ BLOQUEADOR DE ANÚNCIOS - VERSÃO FINAL E TOTAL -->
    <script>
        // LISTA ATUALIZADA COM OS TERMOS DESSE ANÚNCIO ESPECÍFICO
        const bloquear = [
            'ads.', 'ad.', 'anuncio', 'banner', 'popup', 'track', 'analytics', 
            'doubleclick', 'googlesyndication', 'adserver', 'advert', 'pixel',
            'monetization', 'adservice', 'click', 'promo', 'sponsor', 'taboola',
            'outbrain', 'criteo', 'ampproject', 'moatads', 'zedo', 'advertising',
            'pubmatic', 'rubicon', 'appnexus', 'openx', 'adform', 'teads',
            'adtech', 'smartadserver', 'revcontent', 'adblade', 'adroll',
            'flutuante', 'capa', 'overlay', 'modal', 'intersticial', 'sticky',
            'top-banner', 'bottom-banner', 'header-ad', 'footer-ad', 'ad-bar',
            'catálogo', 'produtos', 'gratuito', 'aumente suas vendas', 'tá esperando',
            'abrir >', 'nex', 'card', 'aviso', 'notificacao', 'message-box'
        ];

        // 1. BLOQUEIA TODAS AS REQUISIÇÕES DE PROPAGANDA
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            let url = typeof input === 'string' ? input : input.url;
            if (bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                return new Promise(() => {});
            }
            return originalFetch.apply(this, arguments);
        };

        const originalOpen = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url) {
            if (bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                return;
            }
            return originalOpen.apply(this, arguments);
        };

        // 2. BLOQUEIA CRIAÇÃO DE ELEMENTOS DE ANÚNCIO
        const originalCreateElement = document.createElement;
        document.createElement = function(tag) {
            const el = originalCreateElement.call(this, tag);
            
            if (['script', 'img', 'iframe', 'link', 'div', 'section', 'aside'].includes(tag)) {
                const prop = (tag === 'link') ? 'href' : 'src';
                if (tag !== 'div' && tag !== 'section' && tag !== 'aside') {
                    const originalSet = Object.getOwnPropertyDescriptor(
                        tag === 'link' ? HTMLLinkElement : HTMLImageElement.prototype, 
                        prop
                    ).set;
                    
                    Object.defineProperty(el, prop, {
                        set: function(url) {
                            if (url && bloquear.some(palavra => url.toLowerCase().includes(palavra))) {
                                return;
                            }
                            originalSet.call(this, url);
                        }
                    });
                }

                // BLOQUEIA POR CLASSE, ID OU CONTEÚDO
                const originalSetAttr = el.setAttribute;
                el.setAttribute = function(nome, valor) {
                    if (nome === 'class' || nome === 'id' || nome === 'role') {
                        if (bloquear.some(palavra => valor.toLowerCase().includes(palavra))) {
                            this.style.cssText = 'display:none !important; visibility:hidden !important; height:0 !important; width:0 !important; position:absolute !important; z-index:-9999 !important;';
                        }
                    }
                    return originalSetAttr.call(this, nome, valor);
                };
            }
            return el;
        };

        // 3. FUNÇÃO PRINCIPAL: REMOVE QUALQUER COISA QUE SEJA ANÚNCIO OU CAIXA DE AVISO
        function removerTudoQueEhAnuncio() {
            const todos = document.querySelectorAll('*');
            todos.forEach(el => {
                const texto = (el.textContent || '').toLowerCase();
                const classe = (el.className || '').toLowerCase();
                const id = (el.id || '').toLowerCase();
                const tag = el.tagName.toLowerCase();
                const estilo = getComputedStyle(el);

                // ✅ BLOQUEIA PELO TEXTO QUE APARECEU NA IMAGEM
                if (texto.includes('catálogo') || texto.includes('produtos gratuito') || texto.includes('aumente suas vendas') || texto.includes('tá esperando') || texto.includes('abrir >') || texto.includes('nex')) {
                    el.remove();
                    return;
                }

                // ✅ BLOQUEIA QUALQUER CAIXA BRANCA FLUTUANTE, CENTRALIZADA OU FIXA
                if (
                    (estilo.position === 'fixed' || estilo.position === 'absolute' || estilo.position === 'sticky') &&
                    (estilo.background.includes('white') || estilo.background.includes('#fff') || estilo.background.includes('rgb(255, 255, 255)')) &&
                    el.offsetWidth > 200 && el.offsetHeight > 100 && el.offsetHeight < 400
                ) {
                    el.remove();
                    return;
                }

                // ✅ BLOQUEIA POR NOME DE CLASSE / ID
                if (bloquear.some(palavra => (classe + id + tag).includes(palavra))) {
                    el.remove();
                    return;
                }

                // ✅ BLOQUEIA BARRAS NO TOPO OU RODAPÉ
                if ((estilo.top === '0px' || estilo.bottom === '0px' || estilo.zIndex > 100) && el.offsetHeight > 30 && el.offsetHeight < 250) {
                    el.remove();
                }
            });
        }

        // 4. EXECUTA VÁRIAS VEZES PARA GARANTIR QUE NÃO APAREÇA NADA
        window.addEventListener('load', () => {
            removerTudoQueEhAnuncio();
            setInterval(removerTudoQueEhAnuncio, 100); // Verifica a cada 0,1 segundos (muito rápido)
            setTimeout(removerTudoQueEhAnuncio, 500);
            setTimeout(removerTudoQueEhAnuncio, 1000);
            setTimeout(removerTudoQueEhAnuncio, 2000);
            setTimeout(removerTudoQueEhAnuncio, 3000);
        });

        // 5. BLOQUEIA MENSAGENS E COMUNICAÇÃO DO IFRAME
        window.addEventListener('message', function(e) {
            if (e.data && typeof e.data === 'string' && bloquear.some(p => e.data.toLowerCase().includes(p))) {
                e.stopImmediatePropagation();
                e.preventDefault();
            }
        }, true);

        // 6. REGRAS CSS FORÇADAS - NÃO DEIXA NENHUM ANÚNCIO APARECER
        const css = `
            * {
                animation: none !important;
                transition: none !important;
            }
            *[class*="ad"], *[id*="ad"], *[class*="anuncio"], *[id*="anuncio"], 
            *[class*="banner"], *[id*="banner"], *[class*="popup"], *[id*="popup"],
            *[class*="modal"], *[id*="modal"], *[class*="aviso"], *[id*="aviso"],
            *[class*="catalogo"], *[id*="catalogo"], *[class*="produto"], *[id*="produto"],
            div[style*="position:fixed"], div[style*="position:absolute"], 
            div[style*="z-index:99"], div[style*="z-index:100"] {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                width: 0 !important;
                max-height: 0 !important;
                max-width: 0 !important;
                opacity: 0 !important;
                pointer-events: none !important;
                overflow: hidden !important;
                border: none !important;
                box-shadow: none !important;
            }
        `;
        const style = document.createElement('style');
        style.textContent = css;
        document.head.appendChild(style);
    </script>
    <!-- ✅ FIM DO BLOQUEADOR SUPER REFORÇADO -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            margin: 0 !important;
            padding: 0 !important;
            background: #ffffff;
        }
    </style>
</head>
